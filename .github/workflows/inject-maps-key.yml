name: Inject Maps Key

on:

  push:

    branches: [main]

  workflow_dispatch:

jobs:

  inject:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Inject Maps API key into deployed copy only

        run: sed -i "s|PASTE_YOUR_GOOGLE_MAPS_API_KEY_HERE|${{ secrets.GOOGLE_MAPS_API_KEY }}|g" index.html

      - name: Deploy to Vercel with injected key

        uses: amondnet/vercel-action@v25

        with:

          vercel-token: ${{ secrets.VERCEL_TOKEN }}

          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}

          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

          working-directory: ./
